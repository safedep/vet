name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-generated-code:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run code generation
        run: make generate

      - name: Check for uncommitted changes in generated code
        run: |
          if [[ -n $(git status --porcelain -- ent/ pkg/analyzer/filterv2/) ]]; then
            echo "ERROR: Generated code is out of sync!"
            echo "Please run 'make generate' and commit the changes."
            echo ""
            echo "Files with changes:"
            git status --porcelain -- ent/ pkg/analyzer/filterv2/
            echo ""
            echo "Diff:"
            git diff -- ent/ pkg/analyzer/filterv2/
            exit 1
          fi

      - name: Validate xBOM signatures
        run: go run . code validate

  run-test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build and Test
        run: |
          go mod tidy
          go build
          go test -coverprofile=coverage.txt -v ./...
        env:
          VET_E2E: true

          # Used to avoid rate limiting issue while running
          # test suites that use GitHub API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Coverage
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'push'
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  run-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build vet
        run: |
          go mod tidy
          go build

      - name: Run E2E Scenarios
        run: |
          ./test/scenarios/all.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E Scenarios with Insights V2
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          ./test/scenarios/all.sh
        env:
          E2E_INSIGHTS_V2: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This will not be available when there is a PR from a forked repository
          VET_API_KEY: ${{ secrets.SAFEDEP_CLOUD_API_KEY }}
          VET_CONTROL_TOWER_TENANT_ID: ${{ secrets.SAFEDEP_CLOUD_TENANT_DOMAIN }}
          # Free tier keys, used in e2e test scenerio 15
          VET_API_KEY_FREE: ${{ secrets.SAFEDEP_CLOUD_API_KEY_FREE }}
          VET_CONTROL_TOWER_TENANT_ID_FREE: ${{ secrets.SAFEDEP_CLOUD_TENANT_DOMAIN_FREE }}

  build-container-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Multi-Platform Container Image (verification only)
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
          -t build-container-test:latest .

      - name: Build and Load Native Platform Image for Testing
        run: |
          docker buildx build --platform linux/amd64 --load \
          -t build-container-test:latest .

      - name: Test Container Image
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker run --rm \
            -e VET_API_KEY=${{ secrets.SAFEDEP_CLOUD_API_KEY }} \
            -e VET_CONTROL_TOWER_TENANT_ID=${{ secrets.SAFEDEP_CLOUD_TENANT_DOMAIN }} \
            build-container-test:latest \
            auth verify

  # Exercises the full nx npm pipeline as a release gate:
  # goreleaser snapshot (all platforms) -> sync-binaries -> tsdown wrapper ->
  # smoke (vet version) -> pnpm publish --dry-run. Needs the cross-compile
  # toolchain because vet is CGO; osxcross is cached across runs.
  release-preflight:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      OSX_CROSS_TOOLCHAIN_REPOSITORY: https://github.com/abhisek/osxcross
      OSX_CROSS_MACOS_SDK_VERSION: "12.3"
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install OSX Cross Compiler Build Tools
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update -y
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential clang gcc g++ gcc-mingw-w64 \
            zlib1g-dev libmpc-dev libmpfr-dev libgmp-dev \
            cmake libxml2-dev libssl-dev xz-utils \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup OSX Cross Compiler Tool Chain Environment
        run: echo "OSXCROSS_DIR=$(dirname $GITHUB_WORKSPACE)/osxcross" >> $GITHUB_ENV

      - name: Clone OSX Cross Compiler Tool Chain
        run: git clone $OSX_CROSS_TOOLCHAIN_REPOSITORY $OSXCROSS_DIR

      - name: Cache OSX Cross Compiler Tool Chain
        id: osxcross-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Cache the whole target dir (bin + SDK + lib). Caching only target/bin
          # restores the clang wrappers but not target/SDK, and the build step
          # below is skipped on a cache hit, so the macOS SDK goes missing and the
          # darwin CGO build fails with "cannot find macOS SDK".
          key: ${{ runner.os }}-osxcross-${{ env.OSX_CROSS_MACOS_SDK_VERSION }}-target
          path: ${{ env.OSXCROSS_DIR }}/target

      - name: Build OSX Cross Compiler Tool Chain
        if: steps.osxcross-cache.outputs.cache-hit != 'true'
        run: cd $OSXCROSS_DIR && SDK_VERSION=$OSX_CROSS_MACOS_SDK_VERSION UNATTENDED=yes ./build.sh

      - name: Add OSX Cross Compiler Tool Chain to Path
        run: echo "$OSXCROSS_DIR/target/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@286f3b13b1b49da4ac219696163fb8c1c93e1200 # v6.0.0
        with:
          install-only: true
          version: "~> v2"

      - name: Release preflight
        run: pnpm nx run vet:release-preflight
